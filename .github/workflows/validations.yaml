name: "Validations"

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # run once per week so we always have an artifact for testing and get notified of new versions causing issues
    - cron: 0 0 * * 0

permissions: {}

jobs:
  Static-Analysis:
    name: "Static analysis"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/bootstrap

      - run: make static-analysis

  Unit-Tests:
    name: "Unit tests"
    runs-on: ubuntu-latest
    needs: Tests
    steps:
      - run: echo All unit tests passed!

  Integration-Tests:
    name: "Integration tests"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/bootstrap

      - run: make integration

  Tests:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os:
          - ubuntu-latest # 24.04
          - windows-2025
          - windows-latest # 2022
          - macos-15
          - macos-latest # 14
        go-version:
          - stable # use latest stable version
          - "" # version from go.mod

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/bootstrap
        with:
          go-version: ${{ matrix.go-version }}

      - run: make unit
