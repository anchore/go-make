# IMPORTANT: this file is embedded into go-make via //go:embed and provides default
# tool versions for ALL repos that import go-make. Changing versions here affects
# every consuming repo (unless they override in their own .binny.yaml).
#
# Consuming repos can override any tool by defining it in their local .binny.yaml.
# See README.md "How Tool Versions Work" for details.
# only pull in version updates that were released more than a week ago (low-pass filter for quickly-retracted releases)
cooldown: 7d
tools:
  # we want to use a pinned version of binny to manage the toolchain (so binny manages itself!)
  - name: binny
    version:
      want: v0.13.0
    method: github-release
    with:
      repo: anchore/binny

  # used at release to generate the changelog
  - name: chronicle
    version:
      want: v0.9.0
    method: github-release
    with:
      repo: anchore/chronicle

  # used to produce SBOMs during release
  - name: syft
    version:
      want: v1.42.3
    method: github-release
    with:
      repo: anchore/syft

  # used to sign mac binaries at release
  - name: quill
    version:
      want: v0.7.1
    method: github-release
    with:
      repo: anchore/quill

  # used for signing the checksums file at release
  - name: cosign
    version:
      want: v3.0.5
    method: github-release
    with:
      repo: sigstore/cosign

  # used for linting
  - name: golangci-lint
    version:
      want: v2.11.4
    method: github-release
    with:
      repo: golangci/golangci-lint

  # used to release all artifacts
  - name: goreleaser
    version:
      want: v2.15.2
    method: github-release
    with:
      repo: goreleaser/goreleaser

  # used for organizing imports during static analysis
  - name: gosimports
    version:
      want: v0.3.8
    method: github-release
    with:
      repo: rinchsan/gosimports

  # used during static analysis for license compliance
  - name: bouncer
    version:
      want: v0.4.0
    method: github-release
    with:
      repo: wagoodman/go-bouncer

  # used for running all local and CI tasks
  - name: task
    version:
      want: v3.50.0
    method: github-release
    with:
      repo: go-task/task

  # used for creating GitHub releases in CI
  - name: gh
    version:
      want: v2.91.0
    method: github-release
    with:
      repo: cli/cli
